{% extends 'foodapp/base.html' %}
{% block content %}
<h1>Edit User</h1>
<form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" value="{{ edit_user.username }}">
    <label>First Name</label>
    <input type="text" name="first_name" value="{{ edit_user.first_name }}">
    <label>Last Name</label>
    <input type="text" name="last_name" value="{{ edit_user.last_name }}">
    <label>Email</label>
    <input type="email" name="email" value="{{ edit_user.email }}">
    <label>Password (leave blank to keep current password)</label>
    <input type="password" name="password">
    <label>Role</label>
    <select name="role">
        {% for role in roles %}
            <option value="{{ role.id }}" {% if edit_user.userprofile.role.id == role.id %}selected{% endif %}>{{ role.name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Save</button>
</form>
{% endblock %}
